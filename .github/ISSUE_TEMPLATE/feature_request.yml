---
name: ✨ Feature Request / 功能请求
description: Suggest a new feature or improvement / 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！当前仓库是 private-access，请先按 `docs/README.md` → `SUPPORT.md` 走 docs-first 路由。开放式想法与使用讨论只有在你当前访问模式可见 GitHub Discussions，或未来 public mirror 保留该入口时，才建议走 Discussions；若你已经有明确、可执行的改进提案，再使用这个表单。
        Thanks for suggesting a new feature! This repository is currently private-access, so start with the docs-first route `docs/README.md` → `SUPPORT.md`. Prefer GitHub Discussions for open-ended ideas only when your current access mode exposes Discussions or when a future public mirror preserves that route; use this form when you already have a concrete, actionable proposal.

        当前仍是 single-maintainer、best-effort 项目；提案若缺少受影响区域、真实 use case / user impact 与可验证的 acceptance signal，维护者通常还需要追问才能判断是否值得推进。任何功能提案也都需要符合现有 architecture 与 maintenance budget。
        This is still a single-maintainer, best-effort project. If a proposal does not name the affected area, real use case / user impact, and a validation signal, maintainers usually need more follow-up before they can evaluate it. Any accepted feature also needs to fit the existing architecture and maintenance budget.

  - type: checkboxes
    attributes:
      label: Checklist / 检查清单
      options:
        - label: I have searched existing issues/feature requests and this is not a duplicate. / 我已搜索现有问题，确认这不是重复的。
          required: true
        - label: I understand this is a single-maintainer, best-effort project, and the proposal must fit the architecture + maintenance budget. / 我理解这是 single-maintainer、best-effort 项目，提案必须符合 architecture + maintenance budget。
          required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type / 功能类型
      description: What kind of feature are you requesting? / 你请求的是什么类型的功能？
      options:
        - "New device support / 支持新设备类型"
        - "New device feature / 新设备功能 (如新属性/新控制)"
        - "UI/UX improvement / 界面体验改进"
        - "Performance improvement / 性能优化"
        - "Integration with other services / 与其他服务集成"
        - "Other / 其他"
    validations:
      required: true

  - type: dropdown
    id: device-type
    attributes:
      label: Related Device Type / 相关设备类型
      description: Which device type is this feature for? / 这个功能是针对哪种设备？
      options:
        - "Light (灯具: 筒灯/吸顶灯/灯带/台灯)"
        - "Fan Light (风扇灯)"
        - "Curtain (窗帘)"
        - "Switch Panel (开关面板)"
        - "Outlet (插座)"
        - "Heater (浴霸/暖风机)"
        - "Motion Sensor (人体传感器)"
        - "Door Sensor (门窗传感器)"
        - "New device type / 新设备类型"
        - "All devices / 所有设备"
        - "Not device specific / 与设备无关"
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area / Boundary Family / 受影响区域 / 边界家族
      description: Which area would this proposal primarily change? / 这个提案主要会影响哪个区域？
      options:
        - "Protocol / 协议面 (API / MQTT / auth / discovery)"
        - "Runtime / 运行面 (coordinator / state sync / entity behavior)"
        - "Control / 控制面 (config flow / services / diagnostics)"
        - "External boundary / 外部边界 (installer / firmware metadata / release asset)"
        - "Docs / governance / contributor workflow / 文档、治理或协作流程"
        - "Not sure / 不确定"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题背景
      description: Is your feature request related to a problem? / 这个功能请求是否与某个问题有关？
      placeholder: |
        例如：每次调节亮度都需要等很久才能看到效果...
        Example: Every time I adjust brightness, it takes too long to see the effect...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 期望的解决方案
      description: Describe the smallest workable solution you want to propose. / 描述你希望推进的最小可执行方案。
      placeholder: |
        例如：希望能支持场景模式，一键切换多个设备状态...
        Example: I'd like scene mode support to switch multiple device states with one click...
    validations:
      required: true

  - type: textarea
    id: use-case-impact
    attributes:
      label: Use Case / User Impact / 使用场景 / 用户影响
      description: Who needs this, when do they hit it, and what gets better if we implement it? / 谁会在什么场景下需要它？实现后会改善什么？
      placeholder: |
        受影响的用户 / Users affected:
        典型场景 / Typical workflow:
        当前成本或痛点 / Current pain or cost:
        预期收益 / Expected user impact:
    validations:
      required: true

  - type: textarea
    id: acceptance-signal
    attributes:
      label: Acceptance / Validation Signal / 验收 / 验证信号
      description: How should a maintainer know the proposal is done and working? / 维护者应如何判断这个提案已完成且有效？
      placeholder: |
        例如 / Example:
        - New service appears and works for device family X
        - A specific test, log signal, or UI behavior proves success
        - Documentation or release note change needed
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 备选方案
      description: Have you considered any alternative solutions? / 你考虑过其他替代方案吗？
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他信息
      description: |
        Any other context, screenshots, or references.
        如果是请求支持新设备，请提供设备型号和 Lipro App 中的截图。
      placeholder: |
        设备型号 / Device model:
        Lipro App 截图 / Lipro App screenshot:
        开发者报告 / Developer report JSON (optional):
    validations:
      required: false

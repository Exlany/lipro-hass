---
name: 🐛 Bug Report / 错误报告
description: Report a bug with the Lipro integration / 报告 Lipro 集成的错误
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量详细描述问题，以便我们快速定位和修复。
        Thanks for taking the time to fill out this bug report!

        若你要报告的是安全漏洞，请不要使用此公开表单；请改走 `SECURITY.md` 中的私密披露路径。
        If you are reporting a security vulnerability, do not use this public form; follow the private disclosure path in `SECURITY.md`.

        最低支持的 Home Assistant 版本真源为 `pyproject.toml` 中的 `2026.3.1`。
        The canonical minimum supported Home Assistant version is `2026.3.1` from `pyproject.toml`.

        若仓库或 fork 为私有，CI 会跳过 HACS validation，因为 HACS 只支持公开 GitHub 仓库。
        If this repository or fork is private, CI skips HACS validation because HACS only supports public GitHub repositories.

        若你还没开始系统排障，请先阅读 `docs/TROUBLESHOOTING.md`；若问题涉及发版/打包，请维护者参考 `docs/MAINTAINER_RELEASE_RUNBOOK.md`。
        If you have not started structured troubleshooting yet, read `docs/TROUBLESHOOTING.md` first; maintainer-only release/package issues belong in `docs/MAINTAINER_RELEASE_RUNBOOK.md`.

        对大多数公开 Bug 报告，diagnostics 就是第一优先证据；developer report / 一键反馈是升级排障路径，而不是硬门槛。
        For most public bug reports, diagnostics are the first-line evidence; developer report / one-click feedback is an escalation path, not a hard gate.

  - type: checkboxes
    attributes:
      label: Checklist / 检查清单
      options:
        - label: I have searched existing issues and this is not a duplicate. / 我已搜索现有问题，确认这不是重复的。
          required: true
        - label: I am using the latest version of this integration. / 我正在使用此集成的最新版本。
          required: true
        - label: I have enabled debug logging. / 我已启用调试日志。
          required: true
        - label: If diagnostics were not enough, I also provided a developer report (or submitted one-click feedback). / 若 diagnostics 不足，我也已补充开发者报告（或已一键提交反馈）。
          required: false

  - type: dropdown
    id: problem-type
    attributes:
      label: Problem Type / 问题类型
      description: What kind of problem are you experiencing? / 你遇到了什么类型的问题？
      options:
        - "Login/Authentication failed / 登录认证失败"
        - "Device not discovered / 设备未发现"
        - "Device state not syncing / 设备状态不同步"
        - "Control command not working / 控制命令无效"
        - "MQTT connection issue / MQTT 连接问题"
        - "Integration setup failed / 集成配置失败"
        - "Other / 其他"
    validations:
      required: true

  - type: dropdown
    id: device-type
    attributes:
      label: Affected Device Type / 受影响的设备类型
      description: Which device type is affected? / 哪种设备类型受影响？
      options:
        - "Light (灯具: 筒灯/吸顶灯/灯带/台灯)"
        - "Fan Light (风扇灯)"
        - "Curtain (窗帘)"
        - "Switch Panel (开关面板)"
        - "Outlet (插座)"
        - "Heater (浴霸/暖风机)"
        - "Motion Sensor (人体传感器)"
        - "Door Sensor (门窗传感器)"
        - "All devices / 所有设备"
        - "Not device specific / 与设备无关"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem Description / 问题描述
      description: A clear and concise description of what the bug is. / 清晰简洁地描述问题。
      placeholder: |
        例如：开灯后 Home Assistant 中的状态没有同步更新，需要手动刷新...
        Example: After turning on the light, the state in Home Assistant doesn't sync...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: How can we reproduce this issue? / 如何复现这个问题？
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
      description: What did you expect to happen? / 你期望发生什么？
    validations:
      required: false

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version / Home Assistant 版本
      description: "Minimum supported: 2026.3.1 / 最低支持版本：2026.3.1"
      placeholder: "e.g., 2026.3.1"
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Lipro Integration Version / Lipro 集成版本
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method / 安装方式
      description: "HACS / Shell / shell_command / Manual；private repos or forks skip CI HACS validation. / 私有仓库或 fork 会跳过 CI HACS validation。"
      options:
        - "HACS"
        - "Shell / SSH installer / SSH 安装脚本"
        - "shell_command"
        - "Manual / 手动安装"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs / 调试日志
      description: |
        Enable debug logging by adding this to configuration.yaml:
        在 configuration.yaml 中添加以下内容启用调试日志：
        ```yaml
        logger:
          default: info
          logs:
            custom_components.lipro: debug
        ```
      render: text
    validations:
      required: true

  - type: dropdown
    id: developer-feedback-method
    attributes:
      label: Developer Feedback Method / 开发者反馈方式
      description: How did you provide the developer diagnostics? / 你通过哪种方式提供开发者诊断信息？
      options:
        - "Submitted via lipro.submit_developer_feedback / 已通过服务一键提交"
        - "Pasted JSON from lipro.get_developer_report / 已粘贴 get_developer_report 导出"
        - "Not available / 暂无"
    validations:
      required: true

  - type: textarea
    id: developer-report
    attributes:
      label: Developer Report JSON / 开发者报告 JSON
      description: |
        Optional unless diagnostics still cannot explain the issue or a maintainer asked for deeper debugging. Paste output from `lipro.get_developer_report` (or key parts), or mention submission time if you used one-click feedback. If available, also keep `failure_summary` / `failure_entries`.
        仅当 diagnostics 仍不足以解释问题，或维护者要求更深层排查时才必须提供。请粘贴 `lipro.get_developer_report` 输出（或关键片段）；若使用一键反馈请注明提交时间；若可获取，也请保留 `failure_summary` / `failure_entries`。
      render: json
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他信息
      description: Any other context, screenshots, or device info. / 任何其他上下文、截图或设备信息。
    validations:
      required: false

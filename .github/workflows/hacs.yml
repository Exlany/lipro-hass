name: HACS Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Note skipped HACS validation for private repository
        if: github.event.repository.private
        run: >-
          echo "Skipping HACS Validation because HACS only supports public GitHub repositories."
          >> "$GITHUB_STEP_SUMMARY"

      - name: Run HACS validation
        if: ${{ !github.event.repository.private }}
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485
        with:
          category: integration

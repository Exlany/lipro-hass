send_command:
  name: Send Command
  description: >-
    Send a raw command to a Lipro device. This is an advanced service for
    power users who want to test new commands or access features not yet
    supported by the integration.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number. If not provided, the device will be
        determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    command:
      name: Command
      description: >-
        The command to send to the device.
      required: true
      example: "CHANGE_STATE"
      selector:
        select:
          options:
            - "POWER_ON"
            - "POWER_OFF"
            - "CHANGE_STATE"
            - "CURTAIN_OPEN"
            - "CURTAIN_CLOSE"
            - "CURTAIN_STOP"
          custom_value: true
    properties:
      name: Properties
      description: >-
        Optional list of property key-value pairs to send with the command.
        Each property should have a "key" and "value" field.
      required: false
      example:
        - key: "powerState"
          value: "1"
        - key: "brightness"
          value: "80"
      selector:
        object:

get_schedules:
  name: Get Schedules
  description: >-
    Get the list of timing schedules for a device. Schedules are stored on the
    device and execute even when Home Assistant is offline.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number. If not provided, the device will be
        determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:

add_schedule:
  name: Add Schedule
  description: >-
    Add or update a timing schedule for a device. The schedule is stored on the
    device and will execute even when Home Assistant is offline. Each time entry
    corresponds to an event (action) at that time.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number. If not provided, the device will be
        determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    days:
      name: Days
      description: >-
        List of weekdays when the schedule should run (1=Monday, 7=Sunday).
      required: true
      example: [1, 2, 3, 4, 5, 6, 7]
      selector:
        select:
          multiple: true
          options:
            - label: "Monday"
              value: "1"
            - label: "Tuesday"
              value: "2"
            - label: "Wednesday"
              value: "3"
            - label: "Thursday"
              value: "4"
            - label: "Friday"
              value: "5"
            - label: "Saturday"
              value: "6"
            - label: "Sunday"
              value: "7"
    times:
      name: Times
      description: >-
        List of times in seconds from midnight (0-86399). For example, 28800 = 08:00,
        61200 = 17:00. Each time corresponds to an event in the events list.
      required: true
      example: [28800, 61200]
      selector:
        object:
    events:
      name: Events
      description: >-
        List of event codes corresponding to each time. Common codes:
        0=Light ON, 1=Light OFF, 200=Outlet ON, 201=Outlet OFF,
        400=Fan ON, 401=Fan OFF.
      required: true
      example: [0, 1]
      selector:
        object:

delete_schedules:
  name: Delete Schedules
  description: >-
    Delete timing schedules from a device by their IDs. Use get_schedules first
    to find the schedule IDs.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number. If not provided, the device will be
        determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    schedule_ids:
      name: Schedule IDs
      description: >-
        List of schedule IDs to delete. Get these from the get_schedules service.
      required: true
      example: [123, 124]
      selector:
        object:

submit_anonymous_share:
  name: Submit Anonymous Share Report
  description: >-
    Manually submit the anonymous device share report. This sends anonymized device
    information and error reports to help improve the integration. Anonymous share
    must be enabled in the integration options.

get_anonymous_share_report:
  name: Get Anonymous Share Report
  description: >-
    Preview the anonymous share report data that would be submitted. Use this to
    review what information will be shared before enabling anonymous share.

get_developer_report:
  name: Get Developer Report
  description: >-
    Export a sanitized runtime diagnostics report for real-device debugging.
    Includes mesh topology snapshot, recent command traces, and runtime options.

submit_developer_feedback:
  name: Submit Developer Feedback
  description: >-
    One-click submit sanitized developer diagnostics to the share worker.
    Optionally include a note for easier triage.
  fields:
    note:
      name: Note (Optional)
      description: >-
        Extra context about what you observed during the test.
      required: false
      example: "Group control returns pushSuccess but no visible state change"
      selector:
        text:

query_command_result:
  name: Query Command Result (Developer)
  description: >-
    Developer-only optional capability. Query command delivery result by msgSn.
    This does not alter normal control flow.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial/group ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    msg_sn:
      name: Message SN
      description: >-
        Command message serial number returned by send command response.
      required: true
      selector:
        text:

get_city:
  name: Get City (Developer)
  description: >-
    Developer-only optional capability. Query cloud city metadata (empty payload contract).

fetch_body_sensor_history:
  name: Fetch Body Sensor History (Developer)
  description: >-
    Developer-only optional capability. Fetch body sensor history payload for debugging.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The gateway/group device ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    sensor_device_id:
      name: Sensor Device ID
      description: >-
        Sensor IoT device ID.
      required: true
      selector:
        text:
    mesh_type:
      name: Mesh Type (Optional)
      description: >-
        Mesh type value expected by API contract. Default is "2".
      required: false
      selector:
        text:

fetch_door_sensor_history:
  name: Fetch Door Sensor History (Developer)
  description: >-
    Developer-only optional capability. Fetch door sensor history payload for debugging.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The gateway/group device ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    sensor_device_id:
      name: Sensor Device ID
      description: >-
        Sensor IoT device ID.
      required: true
      selector:
        text:
    mesh_type:
      name: Mesh Type (Optional)
      description: >-
        Mesh type value expected by API contract. Default is "2".
      required: false
      selector:
        text:

refresh_devices:
  name: Refresh Devices
  description: >-
    Force a full Lipro device list refresh for all loaded entries or one specific
    config entry.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Reload only the specified Lipro config entry. If omitted, all loaded Lipro
        entries are refreshed.
      required: false
      selector:
        text:

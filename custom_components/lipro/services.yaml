send_command:
  name: Send Command
  description: >-
    Send a raw command to a Lipro device. This is an advanced service for
    power users who want to test new commands or access features not yet
    supported by the integration.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number or mesh group ID. If not provided, the
        device will be determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    command:
      name: Command
      description: >-
        The command to send to the device.
      required: true
      example: "CHANGE_STATE"
      selector:
        select:
          options:
            - "POWER_ON"
            - "POWER_OFF"
            - "CHANGE_STATE"
            - "CURTAIN_OPEN"
            - "CURTAIN_CLOSE"
            - "CURTAIN_STOP"
          custom_value: true
    properties:
      name: Properties
      description: >-
        Optional list of property key-value pairs to send with the command.
        Each property should have a "key" and "value" field.
      required: false
      example:
        - key: "powerState"
          value: "1"
        - key: "brightness"
          value: "80"
      selector:
        object:

get_schedules:
  name: Get Schedules
  description: >-
    Get the recurring weekly schedules for a device. Weekdays use 1=Monday
    through 7=Sunday. Schedules are stored on the device and execute even
    when Home Assistant is offline. For mesh groups,
    the integration reads through BLE schedule queries with gateway/member
    candidates only. Real-device tests show standard `schedule/get.do` on
    the group ID may return empty success, while member-ID reads can expose
    shadow rows with incompatible IDs; neither is treated as a reliable
    mesh fallback.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number or mesh group ID. If not provided, the
        device will be determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:

add_schedule:
  name: Add Schedule
  description: >-
    Add a recurring weekly timing schedule for a device. No absolute-date
    schedule mode is exposed. The schedule is stored on the device and will
    execute even when Home Assistant is offline. Each time entry
    corresponds to an event (action) at that time. For mesh groups, the
    integration writes through BLE schedule calls with gateway/member
    candidates only. Real-device tests show standard
    `schedule/addOrUpdate.do` on member IoT IDs returns service errors and
    is not a reliable mesh fallback.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number or mesh group ID. If not provided, the
        device will be determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    days:
      name: Days
      description: >-
        List of weekdays for the recurring schedule (1=Monday, 7=Sunday).
      required: true
      example: [1, 2, 3, 4, 5, 6, 7]
      selector:
        select:
          multiple: true
          options:
            - label: "Monday"
              value: "1"
            - label: "Tuesday"
              value: "2"
            - label: "Wednesday"
              value: "3"
            - label: "Thursday"
              value: "4"
            - label: "Friday"
              value: "5"
            - label: "Saturday"
              value: "6"
            - label: "Sunday"
              value: "7"
    times:
      name: Times
      description: >-
        List of times in seconds from midnight (0-86399). For example, 28800 = 08:00
        and 61200 = 17:00. This matches the app's 24-hour hour/minute UI. Each
        time corresponds to an event in the events list.
      required: true
      example: [28800, 61200]
      selector:
        object:
    events:
      name: Events
      description: >-
        List of event codes corresponding to each time. Common codes:
        0=Light ON, 1=Light OFF, 200=Outlet ON, 201=Outlet OFF,
        400=Fan ON, 401=Fan OFF.
      required: true
      example: [0, 1]
      selector:
        object:

delete_schedules:
  name: Delete Schedules
  description: >-
    Delete timing schedules from a device by their IDs. Use get_schedules first
    to find the schedule IDs. For mesh groups, the integration deletes through
    BLE schedule calls with gateway/member candidates only. Real-device tests
    show standard `schedule/delete.do` on member readback IDs can fail with
    `140003` and does not reliably remove the target mesh schedule.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial number or mesh group ID. If not provided, the
        device will be determined from the target entity.
      required: false
      example: "03ab5ccd7c123456"
      selector:
        text:
    schedule_ids:
      name: Schedule IDs
      description: >-
        List of schedule IDs to delete. Get these from the get_schedules service.
      required: true
      example: [123, 124]
      selector:
        object:

submit_anonymous_share:
  name: Submit Anonymous Share Report
  description: >-
    Manually submit the sanitized/pseudonymous device share report. The payload still
    keeps stable installation and diagnostic identifiers (for example installation_id and
    iotName) while sanitizing other device/error details. Anonymous share must be enabled
    in the integration options.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Restrict submission to one specific config entry. Leave empty to submit the
        aggregate pending report across all loaded entries.
      required: false
      example: "c1f3d3d7c1b84d3ea2e6c9f5a1b2c3d4"
      selector:
        text:

get_anonymous_share_report:
  name: Get Anonymous Share Report
  description: >-
    Preview the sanitized/pseudonymous share report data that would be submitted. Use
    this to review which stable installation/diagnostic identifiers remain before enabling
    anonymous share.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Preview one specific config entry report instead of the aggregate pending
        report across all loaded entries.
      required: false
      example: "c1f3d3d7c1b84d3ea2e6c9f5a1b2c3d4"
      selector:
        text:

get_developer_report:
  name: Get Developer Report
  description: >-
    Debug-mode-only capability after standard diagnostics. Export a partially redacted runtime diagnostics report for local real-device debugging. This local
    view still keeps vendor diagnosis identifiers such as iotName and local labels so
    you can identify the device under test. Includes mesh topology snapshot, panel
    capability snapshot, IR remote inventory snapshot, recent command traces, and
    runtime options.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Export diagnostics for one specific config entry. Leave empty to aggregate
        all loaded Lipro entries.
      required: false
      example: "c1f3d3d7c1b84d3ea2e6c9f5a1b2c3d4"
      selector:
        text:

submit_developer_feedback:
  name: Submit Developer Feedback
  description: >-
    Debug-mode-only capability after standard diagnostics. One-click submit
    developer diagnostics to the share worker. Upload keeps vendor diagnosis
    identifiers such as iotName, but sanitizes user-defined labels such as
    device/room/panel/IR names. Optionally limit the upload to one config entry
    and include a note for easier triage.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Submit diagnostics for one specific config entry. Leave empty to include all
        loaded Lipro entries in one aggregate submission.
      required: false
      example: "c1f3d3d7c1b84d3ea2e6c9f5a1b2c3d4"
      selector:
        text:
    note:
      name: Note (Optional)
      description: >-
        Extra context about what you observed during the test.
      required: false
      example: "Group control returns pushSuccess but no visible state change"
      selector:
        text:

query_command_result:
  name: Query Command Result (Developer)
  description: >-
    Debug-mode-only capability after standard diagnostics. Narrow protocol
    probe that queries cloud-reported command result status by msgSn with bounded
    polling inside the default retry budget. Actual attempts may be lower than
    max_attempts because exponential backoff is clipped by the time budget. This
    does not alter normal control flow.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The device serial/group ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    msg_sn:
      name: Message SN
      description: >-
        Command message serial number returned by send command response.
      required: true
      selector:
        text:
    max_attempts:
      name: Max Attempts
      description: >-
        Maximum query attempts within the retry budget. Default 6; set to 1
        for a single-shot check.
      required: false
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box
    time_budget_seconds:
      name: Time Budget (Seconds)
      description: >-
        Total retry budget in seconds. Default 3.0; set to 0 to disable polling
        and perform a single-shot query.
      required: false
      selector:
        number:
          min: 0
          max: 15
          step: 0.1
          mode: box

get_city:
  name: Get City (Developer)
  description: >-
    Debug-mode-only capability after standard diagnostics. Narrow protocol
    probe that queries cloud city metadata using the verified empty-object ({})
    payload contract.

query_user_cloud:
  name: Query User Cloud (Developer)
  description: >-
    Debug-mode-only capability after standard diagnostics. Narrow protocol
    probe that queries user cloud metadata using the verified raw empty-body
    contract (`-d ''`). Tested responses may contain only a top-level `data`
    field without a `code` wrapper.

fetch_body_sensor_history:
  name: Fetch Body Sensor History (Developer)
  description: >-
    Debug-mode-only capability after standard diagnostics. Narrow protocol
    probe that fetches body sensor history payload for deeper debugging.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The gateway/group device ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    sensor_device_id:
      name: Sensor Device ID
      description: >-
        Sensor IoT device ID.
      required: true
      selector:
        text:
    mesh_type:
      name: Mesh Type (Optional)
      description: >-
        Mesh type value expected by API contract. Default is "2".
      required: false
      selector:
        select:
          options:
            - label: "Type 1"
              value: "1"
            - label: "Type 2"
              value: "2"

fetch_door_sensor_history:
  name: Fetch Door Sensor History (Developer)
  description: >-
    Debug-mode-only capability after standard diagnostics. Narrow protocol
    probe that fetches door sensor history payload for deeper debugging.
  target:
    entity:
      integration: lipro
  fields:
    device_id:
      name: Device ID (Optional)
      description: >-
        The gateway/group device ID. If omitted, the target entity is used.
      required: false
      selector:
        text:
    sensor_device_id:
      name: Sensor Device ID
      description: >-
        Sensor IoT device ID.
      required: true
      selector:
        text:
    mesh_type:
      name: Mesh Type (Optional)
      description: >-
        Mesh type value expected by API contract. Default is "2".
      required: false
      selector:
        select:
          options:
            - label: "Type 1"
              value: "1"
            - label: "Type 2"
              value: "2"

refresh_devices:
  name: Refresh Devices
  description: >-
    Force a full Lipro device list refresh for all loaded entries or one specific
    config entry.
  fields:
    entry_id:
      name: Entry ID (Optional)
      description: >-
        Reload only the specified Lipro config entry. If omitted, all loaded Lipro
        entries are refreshed.
      required: false
      selector:
        text:

blueprint:
  name: Lipro - Motion Light
  description: Turn on lights when motion is detected, then turn them off after no-motion delay.
  domain: automation
  source_url: https://github.com/Exlany/lipro-hass/blob/main/blueprints/automation/lipro/motion_light.yaml
  input:
    motion_sensor:
      name: Motion sensor
      description: Binary sensor that reports motion.
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    light_target:
      name: Lights
      description: Light entity or area to control.
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: No-motion delay (seconds)
      description: Turn off lights after the motion sensor stays off for this long.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          mode: box
          unit_of_measurement: seconds

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

condition: []

action:
  - service: light.turn_on
    target: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input motion_sensor
        to: "off"
        for:
          seconds: !input no_motion_wait
  - service: light.turn_off
    target: !input light_target
